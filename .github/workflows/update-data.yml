
name: 更新台股熱力圖資料

# 交易日盤後自動更新（台灣時間），也可手動觸發
on:
  schedule:
    # UTC 時間；台灣 = UTC+8。台股 13:30 收盤，資料約 14:30 後穩定。
    # 下面設 UTC 07:00（台灣 15:00）與 UTC 09:00（台灣 17:00）兩次，抓最終確定值。
    - cron: '0 7 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:        # 允許在 GitHub 網頁上手動按鈕觸發

# 讓 workflow 有權限 commit 回 repo
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 前 rebase 需要完整歷史

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取並產生 data.json
        run: python fetch_data.py

      - name: 若資料有變動則 commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json history_tw.json)" ]; then
            git add data.json history_tw.json
            git commit -m "自動更新台股資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
            # 執行期間 main 可能被其他 workflow 推進 → rebase 後重試（衝突時保留本次資料）
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 4 ]; then echo "重試 4 次仍失敗"; exit 1; fi
              sleep 5
              git pull --rebase -X theirs origin main
            done
            echo "data.json / history_tw.json 已更新並推送。"
          else
            echo "資料無變動，略過。"
          fi
