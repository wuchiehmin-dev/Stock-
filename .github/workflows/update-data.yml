
name: 更新台股熱力圖資料

# 交易日盤後自動更新（台灣時間），也可手動觸發
on:
  schedule:
    # UTC 時間；台灣 = UTC+8。
    # 盤後班：UTC 07:30（台灣 15:30，週一到週五）。等 STOCK_DAY_ALL 與 T86 三大法人
    # 資料定稿（通常 15:00 後）再抓，避免 14:00 抓到半套。
    # 補抓班：UTC 22:00（台灣隔日 06:00，即台灣週一到週五清晨 = UTC 週日到週四），
    # 補上盤後班當下還沒定稿的法人資料。
    - cron: '30 7 * * 1-5'
    - cron: '0 22 * * 0-4'
  workflow_dispatch:        # 允許在 GitHub 網頁上手動按鈕觸發

# 讓 workflow 有權限 commit 回 repo
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # push 前 rebase 需要完整歷史

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取並產生 data.json
        run: python fetch_data.py

      - name: 若資料有變動則 commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data.json history_tw.json industry_tw.json prices)" ]; then
            git add data.json history_tw.json industry_tw.json prices
            git commit -m "自動更新台股資料 $(date -u +'%Y-%m-%d %H:%M UTC')"
            # 執行期間 main 可能被其他 workflow 推進 → rebase 後重試（衝突時保留本次資料）
            n=0
            until git push; do
              n=$((n+1))
              if [ "$n" -ge 4 ]; then echo "重試 4 次仍失敗"; exit 1; fi
              sleep 5
              git pull --rebase -X theirs origin main
            done
            echo "data.json / history_tw.json 已更新並推送。"
          else
            echo "資料無變動，略過。"
          fi
